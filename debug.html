<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Application Debug</h1>
        <button id="checkStatus" class="btn btn-primary">Check Application Status</button>
        <div id="output" class="mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        document.getElementById('checkStatus').addEventListener('click', async () => {
            const output = document.getElementById('output');
            output.innerHTML = '<p>Checking application status...</p>';
            
            try {
                // Check if Supabase is loaded
                if (typeof supabase === 'undefined') {
                    output.innerHTML += '<p class="text-danger">Supabase library not loaded!</p>';
                    return;
                }
                
                output.innerHTML += '<p class="text-success">Supabase library loaded</p>';
                
                // Try to initialize Supabase client
                const SUPABASE_URL = 'https://fvyjbfesakzhquxrfyvz.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eWpiZmVzYWt6aHF1eHJmeXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYzMDMzMTQsImV4cCI6MjA3MTg3OTMxNH0.q3SVC9tUhYqLwyVZOJkQtfE_gcZ1Xrf2Eq-TuyJsg5A';
                
                const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                output.innerHTML += '<p class="text-success">Supabase client initialized</p>';
                
                // Try to fetch firms
                output.innerHTML += '<p>Attempting to fetch firms...</p>';
                const { data, error } = await supabaseClient.from('firms').select('*').limit(5);
                
                if (error) {
                    output.innerHTML += `<p class="text-danger">Error fetching firms: ${error.message}</p>`;
                } else {
                    output.innerHTML += `<p class="text-success">Successfully fetched ${data.length} firms</p>`;
                    if (data.length > 0) {
                        output.innerHTML += '<pre>' + JSON.stringify(data[0], null, 2) + '</pre>';
                    }
                }
                
            } catch (error) {
                output.innerHTML += `<p class="text-danger">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
